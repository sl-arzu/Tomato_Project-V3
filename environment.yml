name: TomatoProject_v2
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12
  
  # Core scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - scikit-learn>=1.3.0
  
  # Deep learning (PyTorch with CUDA support)
  - pytorch::pytorch::*=*cuda*
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8
  
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Data processing
  - pandas>=2.0.0
  - h5py>=3.8.0
  - pyyaml>=6.0
  
  # Development tools
  - jupyter>=1.0.0
  - jupyterlab>=3.6.0
  - pytest>=7.4.0
  - black>=23.7.0
  - flake8>=6.1.0
  
  # System tools
  - git
  
  # Pip packages not available via conda
  - pip
  - pip:
    - python-dotenv>=1.0.0
    - tqdm>=4.65.0
    - plotly>=5.14.0
