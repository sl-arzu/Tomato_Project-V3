[pytest]
# Pytest configuration for TomatoProject_v2

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output
addopts = -v --tb=short

# Markers for test categorization
markers =
    device: Test for device detection (MPS/CUDA/CPU)
    encoder: Test for encoder implementations
    integration: Integration tests (end-to-end)
    visualization: Tests with plot generation
